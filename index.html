<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spellerman</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #87c878; font-family: Arial, sans-serif; }
      #game-container { width: 100%; height: 100%; position: relative; }
      #game-container canvas {
        position: absolute; inset: 0; z-index: 0;
        display: block; width: 100%; height: 100%;
        pointer-events: none;
      }

      #menu-overlay {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(180deg, #4a8f5c 0%, #2d6b3f 100%);
        z-index: 10; transition: opacity 0.4s;
      }
      #menu-overlay.hidden { opacity: 0; pointer-events: none; }
      #menu-overlay h1 {
        font-size: clamp(48px, 10vw, 72px); color: #fff; text-shadow: 0 4px 0 #2d5a3d;
        margin-bottom: 8px;
      }
      #menu-overlay p { font-size: clamp(16px, 3vw, 28px); color: #fff8e1; margin-bottom: 40px; }
      #start-btn {
        padding: 16px 48px; font-size: 28px; font-weight: bold; color: #fff;
        background: #f29400; border: 4px solid #c47a00; border-radius: 12px;
        cursor: pointer; animation: pulse 1.6s ease-in-out infinite;
      }
      #start-btn:hover { background: #ffa726; }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      .menu-hint { margin-top: 32px; color: #e8f5e9; font-size: 16px; text-align: center; max-width: 500px; padding: 0 20px; }

      #hud {
        position: absolute; inset: 0; pointer-events: none; z-index: 10;
        display: none;
      }
      #hud.active { display: block; }

      #hint-text {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.55); color: #fff; padding: 8px 16px;
        border-radius: 8px; font-size: 16px; opacity: 0; transition: opacity 0.2s;
      }
      #hint-text.visible { opacity: 1; }

      #progress-text {
        position: absolute; top: 16px; right: 20px;
        color: #fff; font-size: 18px; text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      }

      #repeat-btn {
        position: absolute; bottom: 175px; left: 24px;
        width: 52px; height: 52px; border-radius: 50%;
        background: #f29400; border: 3px solid #c47a00;
        font-size: 24px; cursor: pointer; pointer-events: auto;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      }
      #repeat-btn:hover { background: #ffa726; }

      #tray-panel {
        position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
        background: rgba(92, 61, 30, 0.85); border: 3px solid #3e2723;
        border-radius: 12px; padding: 12px 16px 10px;
        display: flex; gap: 8px; pointer-events: none;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        z-index: 20;
      }
      #tray-label {
        position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%);
        color: #fff8e1; font-size: 14px; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      }

      .tray-slot {
        width: 64px; height: 72px; background: #6b4226; border: 2px solid #8b5e3c;
        border-radius: 6px; display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: background 0.2s, transform 0.15s;
        position: relative;
      }
      .tray-slot:hover { background: #7d5030; }
      .tray-slot .letter {
        font-size: 40px; font-weight: bold; color: #fff;
      }
      .tray-slot .underscore {
        font-size: 32px; color: #a0724d; position: absolute;
      }
      .tray-slot.correct { background: #4caf50; border-color: #388e3c; }
      .tray-slot.wrong { background: #e53935; }

      #mobile-actions {
        position: absolute; bottom: 110px; right: 20px;
        display: none; pointer-events: auto; flex-direction: column; gap: 8px;
      }
      @media (pointer: coarse) { #mobile-actions { display: flex; } }
      #mobile-actions button {
        padding: 12px 20px; background: #f29400; border: 2px solid #c47a00;
        border-radius: 10px; color: #fff; font-weight: bold; font-size: 15px; cursor: pointer;
      }
      #aim-row { display: flex; gap: 8px; }
      #aim-row button { flex: 1; padding: 10px; font-size: 20px; }
      .floating-reward {
        position: absolute; left: 50%; top: 35%; transform: translate(-50%, -50%);
        font-size: clamp(48px, 12vw, 80px); font-weight: bold;
        text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 30px currentColor;
        animation: float-reward 1.1s ease-out forwards;
        pointer-events: none;
      }
      @keyframes float-reward {
        0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        30% { transform: translate(-50%, -60%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -90%) scale(1); opacity: 0; }
      }

      #particle-layer {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 6;
      }
      .token {
        position: absolute; width: 14px; height: 14px; border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffee58, #ffd700);
        animation: token-fly 0.7s ease-out forwards;
      }
      @keyframes token-fly {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
      }
      .confetti {
        position: absolute; width: 10px; height: 10px;
        animation: confetti-fall 2s ease-in forwards;
      }
      @keyframes confetti-fall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }

      #flash-overlay {
        position: absolute; inset: 0; background: rgba(255,255,200,0.5);
        pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 7;
      }
      #flash-overlay.active { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="menu-overlay">
        <h1>Spellerman</h1>
        <p>Spelling Adventure!</p>
        <button id="start-btn">Start Game</button>
        <p class="menu-hint">WASD to walk &bull; Space to pick up a letter &bull; Walk to the Letter Rack &bull; Space again to throw!</p>
      </div>
      <div id="hud">
        <div id="hint-text"></div>
        <div id="progress-text"></div>
        <button id="repeat-btn" title="Repeat word">🔊</button>
        <div id="tray-label">Your word progress</div>
        <div id="tray-panel"></div>
        <div id="mobile-actions">
          <button id="action-btn">Pick Up / Throw (Space)</button>
        </div>
      </div>
      <div id="particle-layer"></div>
      <div id="flash-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
